  /upload:
    post:
      operationId: postUpload
      tags:
        - 📦 Media Storage
      summary: Upload media
      description: Upload an image, audio, or video file. Supports
        multipart/form-data, raw binary, or base64 JSON. Returns a
        content-addressed hash URL. Duplicate files return the existing hash.
      responses:
        "200":
          description: Upload successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  url:
                    type: string
                  contentType:
                    type: string
                  size:
                    type: integer
                  duplicate:
                    type: boolean
                required:
                  - id
                  - url
                  - contentType
                  - size
                  - duplicate
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "413":
          description: File too large (max 10MB)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "415":
          description: Unsupported media type
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
    servers:
      - url: https://media.pollinations.ai
  /{hash}:
    get:
      operationId: getByHash
      tags:
        - 📦 Media Storage
      summary: Retrieve media
      description: Get a file by its content hash. No authentication required.
        Responses are cached immutably.
      responses:
        "200":
          description: File content with appropriate Content-Type
        "400":
          description: Invalid hash format
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
        "404":
          description: File not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                  - error
      parameters:
        - schema:
            type: string
          in: path
          name: hash
          required: true
    head:
      operationId: headByHash
      tags:
        - 📦 Media Storage
      summary: Check if media exists
      description: Check existence and metadata without downloading the file.
      responses:
        "200":
          description: File exists (headers include Content-Type, Content-Length,
            X-Content-Hash)
        "400":
          description: Invalid hash format
        "404":
          description: File not found
      parameters:
        - schema:
            type: string
          in: path
          name: hash
          required: true
    servers:
      - url: https://media.pollinations.ai
