        - in: query
          name: model
          schema:
            default: openai
            type: string
            enum:
              - openai
              - openai-fast
              - openai-large
              - qwen-coder
              - mistral
              - openai-audio
              - gemini
              - gemini-fast
              - deepseek
              - grok
              - gemini-search
              - midijourney
              - claude-fast
              - claude
              - claude-large
              - claude-legacy
              - perplexity-fast
              - perplexity-reasoning
              - kimi
              - gemini-large
              - gemini-legacy
              - nova-fast
              - glm
              - minimax
              - nomnom
              - polly
              - qwen-safety
              - qwen-character
