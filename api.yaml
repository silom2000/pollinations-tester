  /account/key:
    get:
      operationId: getAccountKey
      tags:
        - 👤 Account
      summary: Get API Key Info
      description: "Returns information about the API key used in the request:
        validity, type (secret/publishable), expiry, permissions, and remaining
        budget. Useful for validating keys without making generation requests."
      responses:
        "200":
          description: API key status and information
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Whether the API key is valid and active
                  type:
                    type: string
                    enum:
                      - publishable
                      - secret
                    description: Type of API key
                  name:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: Display name of the API key
                  expiresAt:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: Expiry timestamp in ISO 8601 format, null if never expires
                  expiresIn:
                    anyOf:
                      - type: number
                      - type: "null"
                    description: Seconds until expiry, null if never expires
                  permissions:
                    type: object
                    properties:
                      models:
                        anyOf:
                          - type: array
                            items:
                              type: string
                          - type: "null"
                        description: List of allowed model IDs, null = all models allowed
                      account:
                        anyOf:
                          - type: array
                            items:
                              type: string
                          - type: "null"
                        description: List of account permissions, null = no account access
                    required:
                      - models
                      - account
                    description: API key permissions
                  pollenBudget:
                    anyOf:
                      - type: number
                      - type: "null"
                    description: Remaining pollen budget for this key, null = unlimited (uses user
                      balance)
                  rateLimitEnabled:
                    type: boolean
                    description: Whether rate limiting is enabled for this key
                required:
                  - valid
                  - type
                  - name
                  - expiresAt
                  - expiresIn
                  - permissions
                  - pollenBudget
                  - rateLimitEnabled
              example:
                valid: true
                type: secret
                prefix: sk_
                expiresAt: null
                permissions:
                  - generate:text
                  - generate:image
                  - generate:audio
                  - account:balance
                  - account:usage
                pollenBudget: null
                rateLimitEnabled: false
        "401":
          description: Invalid or missing API key
      x-codeSamples:
        - label: cURL
          lang: Shell
          source: |-
            curl https://gen.pollinations.ai/account/key \
              -H "Authorization: Bearer YOUR_API_KEY"
        - label: Python
          lang: Python
          source: |-
            import requests

            response = requests.get(
                "https://gen.pollinations.ai/account/key",
                headers={"Authorization": "Bearer YOUR_API_KEY"},
            )
            key_info = response.json()
            print(f"Valid: {key_info['valid']}, Type: {key_info['type']}")
        - label: JavaScript
          lang: JavaScript
          source: |-
            const response = await fetch(
              "https://gen.pollinations.ai/account/key",
              { headers: { Authorization: "Bearer YOUR_API_KEY" } },
            );
            const keyInfo = await response.json();
            console.log(`Valid: ${keyInfo.valid}, Type: ${keyInfo.type}`);
