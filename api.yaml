            of available models.
        - in: query
          name: seed
          schema:
            default: 0
            type: integer
            minimum: -1
            maximum: 9007199254740991
          description: Seed for reproducible results. Use -1 for random.
        - in: query
          name: system
          schema:
            type: string
          description: System prompt to set the model's behavior and context. Acts as
            initial instructions before the user prompt.
        - in: query
          name: json
          schema:
            default: false
            type: boolean
          description: When true, the model returns valid JSON. Useful for structured data
            extraction.
        - in: query
          name: temperature
          schema:
            type: number
          description: "Controls randomness. Lower values (e.g. 0.2) produce more focused
            output, higher values (e.g. 1.5) produce more creative output.
            Range: 0.0 to 2.0."
        - in: query
          name: stream
          schema:
            default: false
            type: boolean
          description: Stream the response as it's generated, using Server-Sent Events
            (SSE). Each chunk contains partial text.
      x-codeSamples:
        - label: cURL
          lang: Shell
          source: >-
            curl
            "https://gen.pollinations.ai/text/Write%20a%20haiku?model=openai" \
              -H "Authorization: Bearer YOUR_API_KEY"
        - label: Python
          lang: Python
          source: |-
            import requests

            response = requests.get(
                "https://gen.pollinations.ai/text/Write a haiku",
                params={"model": "openai"},
                headers={"Authorization": "Bearer YOUR_API_KEY"},
            )
            print(response.text)
        - label: JavaScript
          lang: JavaScript
          source: |-
            const response = await fetch(
              "https://gen.pollinations.ai/text/Write%20a%20haiku?model=openai",
              { headers: { Authorization: "Bearer YOUR_API_KEY" } },
            );
            console.log(await response.text());
